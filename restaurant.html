<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Кухня та бар — Ресторан">
<meta name="theme-color" content="#1A3021">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Кухня та бар — Ресторан</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Source+Serif+Pro:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #1A3021; --accent-dim: #2a4632; --accent-soft: #5F6F64;
  --cream: #FCF9F1; --cream2: #f5f1e6; --cream3: #e8e2d3;
  --white: #FFFFFF; --text: #000000; --text-dim: #595959; --text-mute: #707070;
  --warn: #640023; --border: rgba(95,111,100,0.25); --shadow: rgba(26,48,33,0.08);
  --red: #640023;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; width:100%; background:var(--cream); color:var(--text); font-family:'Inter',sans-serif; font-size:15px; overflow:hidden; -webkit-font-smoothing:antialiased; }
#app { display:flex; flex-direction:column; height:100vh; height:-webkit-fill-available; max-width:800px; margin:0 auto; background:var(--cream); }
header { flex-shrink:0; background:var(--accent); border-bottom:1px solid var(--accent-dim); padding-top:env(safe-area-inset-top,0px); position:relative; z-index:10; color:var(--cream); }
.header-main { display:flex; align-items:center; justify-content:space-between; padding:10px 20px 12px; }
.logo-wrap { display:flex; align-items:center; gap:12px; text-decoration:none; color:inherit; cursor:pointer; transition:opacity 0.15s ease; }
.logo-wrap:hover { opacity:0.85; } .logo-wrap:active { opacity:0.7; }
.logo-mark { height:44px; width:44px; display:flex; align-items:center; justify-content:center; }
.logo-mark svg { height:44px; width:44px; display:block; border-radius:8px; }
.logo-text { font-family:'Playfair Display',serif; font-size:20px; font-weight:600; color:var(--cream); letter-spacing:0.01em; font-style:italic; }
.logo-info { display:flex; flex-direction:column; gap:2px; }
.dept-label { font-family:'Source Serif Pro',serif; font-size:11px; font-weight:400; letter-spacing:0.22em; text-transform:uppercase; color:rgba(252,249,241,0.6); margin-top:2px; }
.dept-badge { display:flex; align-items:center; gap:8px; }
.dept-pill { font-family:'Inter',sans-serif; font-size:11px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent); background:var(--cream); padding:5px 14px; border-radius:20px; }
.online-dot { width:8px; height:8px; border-radius:50%; background:#6ace7e; box-shadow:0 0 0 2px rgba(106,206,126,0.25); animation:pulse 2.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
.demo-tag { font-size:10px; color:rgba(252,249,241,0.55); border:1px solid rgba(252,249,241,0.25); border-radius:8px; padding:2px 7px; letter-spacing:0.08em; text-transform:uppercase; font-weight:400; }
#chat { flex:1; overflow-y:auto; padding:18px 16px 10px; display:flex; flex-direction:column; gap:10px; scroll-behavior:smooth; -webkit-overflow-scrolling:touch; background:var(--cream); }
#chat::-webkit-scrollbar { display:none; }
.day-sep { text-align:center; font-size:11px; color:var(--text-mute); letter-spacing:0.1em; text-transform:uppercase; margin:4px 0 10px; font-family:'Inter',sans-serif; font-weight:300; }
.msg { display:flex; flex-direction:column; max-width:82%; animation:fadeUp 0.22s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
.msg.out { align-self:flex-end; align-items:flex-end; }
.msg.in  { align-self:flex-start; align-items:flex-start; }
.bubble { padding:11px 15px; border-radius:16px; line-height:1.55; font-size:14.5px; font-weight:300; word-break:break-word; box-shadow:0 1px 3px var(--shadow); }
.msg.out .bubble { background:var(--white); border:1px solid var(--border); border-bottom-right-radius:4px; color:var(--text); }
.msg.in  .bubble { background:var(--white); border:1px solid var(--border); border-bottom-left-radius:4px; }
.msg-meta { font-size:11px; color:var(--text-mute); margin-top:4px; padding:0 4px; font-weight:300; }
.response-card { background:#fff; border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:16px; border-bottom-left-radius:4px; padding:14px 16px; box-shadow:0 1px 4px var(--shadow); }
.r-header { font-family:'Source Serif Pro',serif; font-size:12px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-dim); margin-bottom:11px; display:flex; align-items:center; gap:8px; }
.order-line { display:flex; justify-content:space-between; align-items:baseline; padding:6px 0; border-bottom:1px solid var(--border); gap:10px; }
.order-line:last-of-type { border-bottom:none; margin-bottom:0; }
.order-item { color:var(--text); flex:1; font-weight:400; font-size:14px; }
.order-qty  { color:var(--text); font-weight:600; white-space:nowrap; font-size:14px; }
.flag { display:inline-block; font-size:10px; padding:2px 6px; border-radius:8px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; margin-left:6px; font-family:'Inter',sans-serif; }
.flag.merged { background:rgba(52,152,219,0.1); color:#2980b9; border:1px solid rgba(52,152,219,0.25); }
.flag.cross  { background:rgba(230,126,34,0.1); color:#d35400; border:1px solid rgba(230,126,34,0.25); }
.flag.warn   { background:rgba(100,0,35,0.08); color:var(--warn); border:1px solid rgba(100,0,35,0.25); }
.r-footer { font-size:12px; color:var(--text-mute); margin-top:10px; padding-top:8px; border-top:1px solid var(--border); font-weight:300; }
.typing { display:flex; align-items:center; gap:4px; padding:13px 16px; background:var(--white); border:1px solid var(--border); border-radius:16px; border-bottom-left-radius:4px; width:fit-content; }
.typing span { width:6px; height:6px; background:var(--text-mute); border-radius:50%; animation:bounce 1.1s infinite; }
.typing span:nth-child(2){animation-delay:0.18s} .typing span:nth-child(3){animation-delay:0.36s}
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
.confirm-row { display:flex; gap:8px; margin-top:10px; }
.confirm-btn { flex:1; padding:10px 0; border-radius:10px; border:1px solid var(--border); background:var(--white); color:var(--text); font-family:'Inter',sans-serif; font-size:13px; font-weight:400; cursor:pointer; transition:all 0.15s; }
.confirm-btn.primary { background:var(--accent); color:var(--cream); border-color:var(--accent); }
.confirm-btn:active { opacity:0.75; transform:scale(0.97); }
#input-bar { flex-shrink:0; background:var(--cream); border-top:1px solid var(--border); padding:12px 16px; padding-bottom:calc(12px + env(safe-area-inset-bottom,0px)); box-shadow:0 -2px 12px var(--shadow); }
.input-hint { font-size:11px; color:var(--text-mute); margin-bottom:8px; font-weight:300; letter-spacing:0.04em; }
.input-row { display:flex; align-items:flex-end; gap:10px; }
#msg-input { flex:1; background:var(--white); border:1px solid var(--border); border-radius:20px; padding:10px 16px; color:var(--text); font-family:'Inter',sans-serif; font-size:15px; font-weight:300; resize:none; max-height:100px; outline:none; transition:border-color 0.2s; -webkit-appearance:none; line-height:1.4; }
#msg-input::placeholder { color:var(--text-mute); }
#msg-input:focus { border-color:var(--accent); background:var(--white); }
#send-btn { min-width:110px; height:44px; border-radius:22px; background:var(--accent); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; padding:0 22px; transition:background 0.2s,transform 0.1s; box-shadow:0 2px 8px rgba(26,48,33,0.18); font-family:'Inter',sans-serif; font-size:14px; font-weight:500; color:var(--cream); letter-spacing:0.02em; }
#send-btn:hover { background:var(--accent-dim); }
#send-btn:active { transform:scale(0.97); background:var(--accent-dim); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-main">
      <a href="/" class="logo-wrap" aria-label="На головну">
        <div class="logo-mark"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 48 48"><rect width="48" height="48" fill="#fcf9f1" rx="8"/><path fill="#1A3021" fill-rule="evenodd" d="M38 15.5h-1.356q-.341.165-.456.572-.13.432-.13 1.373v12.61q0 .915.13 1.373.013.037.028.072H38V33H10v-1.58q.835-.049 1.254-.194a.88.88 0 0 0 .59-.581q.059-.182.094-.44.002-.075.003-.153v-12.61q0-.941-.155-1.374a.85.85 0 0 0-.466-.568H10V14h28zM16.059 30.052q0 .903.126 1.361l.085.007v.08h4.45q-.495-.585-.787-1.873l-.689-3.005a11.6 11.6 0 0 0-.517-1.768 2.37 2.37 0 0 0-.933-1.164q-.599-.407-1.735-.432zM23.203 15.5q-.249.104-.492.243-.712.39-1.426 1.26l-4.637 5.808q.94.05 1.785.25 1.155.266 1.966 1.017.812.75 1.157 2.23l.713 3.052q.27 1.114.49 1.575.222.436.764.412.417-.026.688-.267.094-.078.19-.175v-.31q0-2.481.273-4.105.273-1.622.73-2.545.471-.954 1.034-1.337.093-.06.188-.113v-3.42q0-.4-.066-.583a.36.36 0 0 0-.238-.259q-.173-.075-.51-.085v-.216q.282.01.727.021a42 42 0 0 0 2.624-.021v.216q-.346.01-.531.085a.36.36 0 0 0-.229.26q-.054.182-.053.581v3.303q.28.116.536.327.593.478 1.018 1.432.426.955.654 2.419.243 1.431.243 3.34 0 .501-.013 1.605h.975l.023-.072q.155-.458.155-1.372v-12.61q0-.942-.155-1.374a.85.85 0 0 0-.476-.572zm-6.57 0q-.332.166-.445.568-.13.432-.13 1.373v4.904a4.1 4.1 0 0 0 1.12-.956l2.361-2.956q.811-1.018 1.106-1.72.296-.703-.024-1.067a.8.8 0 0 0-.17-.146z" clip-rule="evenodd"/></svg></div>
        <div class="logo-info">
          <span class="logo-text">Кухня &amp; бар</span>
          <div class="dept-label">Замовлення &middot; Ресторан</div>
        </div>
      </a>
      <div class="dept-badge">
        <span class="demo-tag">demo</span>
        <div class="dept-pill">Ресторан</div>
        <div class="online-dot"></div>
      </div>
    </div>
  </header>

  <div id="chat">
    <div class="day-sep" id="cur-date"></div>
    <div class="msg in">
      <div class="response-card">
        <div class="r-header">Система &middot; Ресторан</div>
        Вітаємо в системі замовлень &laquo;Кухня та бар&raquo;.<br>
        Напишіть замовлення у вільному форматі.<br>
        <span style="color:var(--text-mute);font-size:13px;font-weight:300;">Напр.: 5 кг помідорів, 2 кг сиру, 10 баклажанів</span>
      </div>
      <div class="msg-meta">Система &middot; щойно</div>
    </div>
  </div>

  <div id="input-bar">
    <div class="input-hint">Ресторан &middot; напишіть замовлення у вільному форматі</div>
    <div class="input-row">
      <textarea id="msg-input" placeholder="Напишіть замовлення…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()">Надіслати</button>
    </div>
  </div>
</div>
<script>
const CONFIG = {
  venue: 'restaurant',
  webhookUrl: 'https://stakanov92.app.n8n.cloud/webhook/smartorder-demo'
};
const DEMO_MODE  = false;
const DEPT       = CONFIG.venue;
const DEPT_LABEL = CONFIG.venue === 'bar' ? 'Бар' : 'Ресторан';
const WEBHOOK_URL = CONFIG.webhookUrl;

const _pendingOrders = {};
let _mergedQueue = [];

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('cur-date').textContent =
    new Date().toLocaleDateString('uk-UA', {weekday:'long', day:'numeric', month:'long'});
  scrollBottom();
});

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; autoResize(input);
  appendUserMsg(text); showTyping();

  if (DEMO_MODE || !WEBHOOK_URL) {
    await sleep(900 + Math.random()*700);
    removeTyping(); appendDemoResponse(parseDemoResponse(text)); return;
  }
  try {
    const res = await fetch(WEBHOOK_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action:'new_order', text, venue:CONFIG.venue, timestamp:new Date().toISOString()})
    });
    removeTyping();
    if (!res.ok) { appendError('Помилка сервера (HTTP ' + res.status + '). Спробуйте ще раз.'); return; }
    const raw = await res.text();
    if (!raw || raw.trim()==='' || raw.trim()==='OK' || raw.trim().toLowerCase()==='success') {
      appendBubble('&#10003; Запит надіслано (тестовий режим)', 'var(--text-mute)'); return;
    }
    try { handleOrderResponse(JSON.parse(raw)); }
    catch(e) { appendBubble('&#10003; Запит надіслано (response не JSON)', 'var(--text-mute)'); }
  } catch(e) { removeTyping(); appendError("Помилка з’єднання. Спробуйте ще раз."); }
}

function handleOrderResponse(data) {
  const items = data.items || [];
  if (!items.length) { appendError('Жодної позиції не розпізнано. Спробуйте ще раз.'); return; }
  const id = 'order_' + Date.now();
  _pendingOrders[id] = {items, week_id:data.week_id||'', department:data.department||DEPT};
  let lines = '';
  items.forEach(function(item) {
    const name=escHtml(item.product||item.name||''), qty=item.quantity||item.qty||0, unit=escHtml(item.unit||''), status=item.status||'new';
    let badge='', extra='';
    if (status==='merged') {
      badge='<span class="flag merged">MERGED</span>';
      extra='<div style="font-size:11px;color:var(--text-mute);margin-top:2px;">Вже є: '+(item.existing_quantity||0)+' '+unit+' &middot; буде оброблено окремо</div>';
    } else if (status==='cross') { badge='<span class="flag cross">CROSS</span>'; }
    lines+='<div class="order-line" style="flex-wrap:wrap;"><span class="order-item">'+name+badge+'</span><span class="order-qty">'+qty+' '+unit+'</span>'+extra+'</div>';
  });
  const newN=items.filter(function(i){return i.status!=='merged';}).length;
  const mrgN=items.filter(function(i){return i.status==='merged';}).length;
  let footer=newN+' нових'; if(mrgN) footer+=' &middot; '+mrgN+' дубл.';
  const chat=document.getElementById('chat');
  const div=document.createElement('div'); div.className='msg in'; div.id=id;
  div.innerHTML='<div class="response-card"><div class="r-header">ПІДТВЕРДИТИ ЗАМОВЛЕННЯ?</div>'+lines+
    '<div class="r-footer">'+footer+'</div>'+
    '<div class="confirm-row">'+
    '<button class="confirm-btn" id="cancel-'+id+'">Скасувати</button>'+
    '<button class="confirm-btn primary" id="ok-'+id+'">Підтвердити</button>'+
    '</div></div><div class="msg-meta">Система &middot; '+timeNow()+'</div>';
  chat.appendChild(div);
  document.getElementById('cancel-'+id).onclick=function(){wCancel(id);};
  document.getElementById('ok-'+id).onclick=function(){wConfirm(id);};
  scrollBottom();
}

function wCancel(id) {
  delete _pendingOrders[id];
  const el=document.getElementById(id); if(el) el.remove();
  appendBubble('Замовлення скасоване.','var(--text-mute)');
}

async function wConfirm(id) {
  const order=_pendingOrders[id]; if(!order) return;
  delete _pendingOrders[id];
  const el=document.getElementById(id); if(el) el.remove();
  const newCross=order.items.filter(function(i){return i.status!=='merged';});
  const merged=order.items.filter(function(i){return i.status==='merged';});
  if (newCross.length) {
    showTyping();
    try {
      await fetch(WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'confirm',venue:CONFIG.venue,week_id:order.week_id,items:newCross})});
      removeTyping();
      let lines='';
      newCross.forEach(function(item){
        const name=escHtml(item.product||item.name||''),qty=item.quantity||item.qty||0,unit=escHtml(item.unit||'');
        const flag=item.status==='cross'?'<span class="flag cross">CROSS</span>':'';
        lines+='<div class="order-line"><span class="order-item">'+name+flag+'</span><span class="order-qty">'+qty+' '+unit+'</span></div>';
      });
      const chat=document.getElementById('chat');
      const div2=document.createElement('div'); div2.className='msg in';
      div2.innerHTML='<div class="response-card"><div class="r-header">&#10003; ЗАМОВЛЕННЯ ПІДТВЕРДЖЕНО</div>'+
        lines+'<div class="r-footer">'+newCross.length+' позицій записано</div></div>'+
        '<div class="msg-meta">Система &middot; '+timeNow()+'</div>';
      chat.appendChild(div2); scrollBottom();
    } catch(e){ removeTyping(); appendError('Помилка під час підтвердження.'); }
  }
  if (merged.length) { _mergedQueue=merged.slice(); showNextMerged(); }
}

function showNextMerged() {
  if (!_mergedQueue.length) return;
  const item=_mergedQueue[0], chat=document.getElementById('chat');
  const id='merged_'+Date.now();
  const name=item.product||item.name||'', qty=item.quantity||item.qty||0;
  const unit=item.unit||'', existing=item.existing_quantity||0;
  const div=document.createElement('div'); div.className='msg in'; div.id=id;
  div.innerHTML='<div class="response-card">'+
    '<div class="r-header" style="color:var(--red)">&#9888; ВЖЕ ІСНУЄ В ЗАМОВЛЕННІ</div>'+
    '<div class="order-line"><span class="order-item">'+escHtml(name)+'<span class="flag merged">MERGED</span></span>'+
    '<span class="order-qty">Зараз: '+existing+' '+escHtml(unit)+'</span></div>'+
    '<div style="margin-top:10px;font-size:13px;color:var(--text-dim);">Додати ще <strong>'+qty+' '+escHtml(unit)+'</strong>?</div>'+
    '<div class="confirm-row">'+
    '<button class="confirm-btn" id="skip-'+id+'">Скасувати</button>'+
    '<button class="confirm-btn primary" id="add-'+id+'">+ Додати</button>'+
    '</div></div><div class="msg-meta">Система &middot; '+timeNow()+'</div>';
  chat.appendChild(div);
  document.getElementById('skip-'+id).onclick=function(){cancelMerged(id);};
  document.getElementById('add-' +id).onclick=function(){confirmMerged(id,name,qty,unit,existing);};
  scrollBottom();
}

function cancelMerged(id) {
  const el=document.getElementById(id); if(el) el.remove();
  _mergedQueue.shift(); appendBubble('Позицію пропущено.','var(--text-mute)');
  if(_mergedQueue.length) setTimeout(showNextMerged,400);
}

async function confirmMerged(id,name,qty,unit,existing) {
  const el=document.getElementById(id); if(el) el.remove(); _mergedQueue.shift();
  showTyping();
  try {
    await fetch(WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'add_more',venue:CONFIG.venue,product:name,quantity:parseInt(qty),unit:unit,reason:'Manual'})});
    removeTyping();
    appendBubble('&#10003; '+escHtml(name)+': '+existing+' &#8594; '+(parseInt(existing)+parseInt(qty))+' '+escHtml(unit),'var(--text)');
  } catch(e){ removeTyping(); appendError('Помилка оновлення '+escHtml(name)+'.'); }
  if(_mergedQueue.length) setTimeout(showNextMerged,400);
}

function appendUserMsg(text){
  const chat=document.getElementById('chat'), div=document.createElement('div');
  div.className='msg out';
  div.innerHTML='<div class="bubble">'+escHtml(text)+'</div><div class="msg-meta">'+DEPT_LABEL+' &middot; '+timeNow()+'</div>';
  chat.appendChild(div); scrollBottom();
}
let typingEl=null;
function showTyping(){ const chat=document.getElementById('chat'); typingEl=document.createElement('div'); typingEl.className='msg in'; typingEl.innerHTML='<div class="typing"><span></span><span></span><span></span></div>'; chat.appendChild(typingEl); scrollBottom(); }
function removeTyping(){ if(typingEl){ typingEl.remove(); typingEl=null; } }
function appendBubble(html,color){ const chat=document.getElementById('chat'),div=document.createElement('div'); div.className='msg in'; div.innerHTML='<div class="bubble" style="color:'+(color||'var(--text)')+'">'+html+'</div><div class="msg-meta">Система &middot; '+timeNow()+'</div>'; chat.appendChild(div); scrollBottom(); }
function appendError(msg){ const chat=document.getElementById('chat'),div=document.createElement('div'); div.className='msg in'; div.innerHTML='<div class="bubble" style="color:var(--red)">'+escHtml(msg)+'</div>'; chat.appendChild(div); scrollBottom(); }

const demoStock={};
function parseDemoResponse(text){
  const tokens=text.split(/[,;]+/).map(function(s){return s.trim();}).filter(Boolean), items=[];
  tokens.forEach(function(tok){
    const m=tok.match(/^(\d+)\s*([^\d\s]+)?\s*(.+)?$/i);
    if(m){ const qty=parseInt(m[1]),unit=m[2]||'шт',name=(m[3]||tok.replace(/^\d+\s*/,'')).trim(),key=name.toLowerCase();
      if(demoStock[key]) return items.push({name,qty,unit,_dup:true});
      demoStock[key]=qty; items.push({name,qty,unit}); }
  });
  return {items,summary:items.length+' позицій &middot; демо'};
}
function appendDemoResponse(data){
  const chat=document.getElementById('chat'),div=document.createElement('div'); div.className='msg in';
  let lines=''; (data.items||[]).forEach(function(item){ lines+='<div class="order-line"><span class="order-item">'+escHtml(item.name||'')+'</span><span class="order-qty">'+(item.qty||'')+' '+escHtml(item.unit||'')+'</span></div>'; });
  div.innerHTML='<div class="response-card"><div class="r-header">&#10003; ЗАМОВЛЕННЯ ЗАРЕЄСТРОВАНО</div>'+lines+'<div class="r-footer">'+(data.summary||'')+'</div></div><div class="msg-meta">Система &middot; '+timeNow()+'</div>';
  chat.appendChild(div); scrollBottom();
}

function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
function scrollBottom(){ const c=document.getElementById('chat'); setTimeout(function(){c.scrollTop=c.scrollHeight;},50); }
function sleep(ms){ return new Promise(function(r){setTimeout(r,ms);}); }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function timeNow(){ return new Date().toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'}); }
</script>
